<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>抓大鹅 - 消除游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none;
        }
        
        #gameHeader {
            padding: 8px 15px;
            text-align: center;
            color: white;
            flex-shrink: 0;
        }
        
        #gameHeader h1 {
            font-size: clamp(18px, 5vw, 24px);
            margin-bottom: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        #gameHeader .subtitle {
            font-size: clamp(12px, 3vw, 14px);
            opacity: 0.9;
        }
        
        #gameContainer {
            position: relative;
            flex: 1;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            min-height: 300px;
        }
        
        #gameCanvas {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            touch-action: none;
            width: 100% !important;
            height: auto !important;
            display: block;
        }
        
        #scoreBoard {
            position: absolute;
            top: 5px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 15px;
            color: white;
            font-size: clamp(12px, 3vw, 14px);
            backdrop-filter: blur(5px);
        }
        
        #slotContainer {
            width: 100%;
            max-width: 400px;
            height: clamp(55px, 12vw, 70px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            margin: 8px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(3px, 1vw, 5px);
            padding: 5px;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }
        
        .slot {
            width: clamp(40px, 10vw, 50px);
            height: clamp(40px, 10vw, 50px);
            background: rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            border: 2px dashed rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(24px, 6vw, 30px);
            transition: all 0.3s ease;
        }
        
        .slot.filled {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.9);
            transform: scale(1.05);
        }
        
        #controls {
            padding: 8px 15px 15px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .btn {
            padding: clamp(10px, 3vw, 12px) clamp(20px, 5vw, 30px);
            font-size: clamp(14px, 4vw, 16px);
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            touch-action: manipulation;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .btn:hover, .btn:active {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        
        #modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: clamp(25px, 8vw, 40px);
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease;
            max-width: 90%;
            width: 320px;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .modal-content h2 {
            font-size: clamp(24px, 7vw, 32px);
            margin-bottom: 10px;
        }
        
        .modal-content p {
            font-size: clamp(14px, 4vw, 18px);
            color: #666;
            margin-bottom: 20px;
        }
        
        .modal-content .btn {
            margin: 5px;
        }
        
        .win { color: #4CAF50; }
        .lose { color: #f5576c; }
        
        /* 移动端优化 */
        @media (max-height: 700px) {
            #gameHeader {
                padding: 5px 10px;
            }
            
            #slotContainer {
                margin: 5px 10px;
            }
            
            #controls {
                padding: 5px 10px 10px;
            }
        }
    </style>
</head>
<body>
    <div id="gameHeader">
        <h1>🦢 抓大鹅</h1>
        <div class="subtitle">点击物品放入槽位，3个相同消除</div>
    </div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="scoreBoard">剩余: <span id="remaining">0</span></div>
    </div>
    
    <div id="slotContainer">
        <div class="slot" data-index="0"></div>
        <div class="slot" data-index="1"></div>
        <div class="slot" data-index="2"></div>
        <div class="slot" data-index="3"></div>
        <div class="slot" data-index="4"></div>
        <div class="slot" data-index="5"></div>
        <div class="slot" data-index="6"></div>
    </div>
    
    <div id="controls">
        <button class="btn btn-primary" id="restartBtn">重新开始</button>
        <button class="btn btn-secondary" id="shuffleBtn">🔀 洗牌</button>
    </div>
    
    <div id="modal">
        <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <p id="modalMessage"></p>
            <button class="btn btn-primary" id="modalBtn">再玩一次</button>
        </div>
    </div>
    
    <script src="catch-goose.js"></script>
</body>
</html>
