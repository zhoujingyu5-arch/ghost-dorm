<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猛鬼宿舍 - Ghost Dorm Defense</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }
        
        #gameTitle {
            font-size: 2.5em;
            margin: 20px 0;
            text-shadow: 0 0 20px #e94560, 0 0 40px #e94560;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px #e94560, 0 0 40px #e94560; }
            to { text-shadow: 0 0 30px #e94560, 0 0 60px #e94560, 0 0 80px #e94560; }
        }
        
        #gameContainer {
            display: flex;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        #gameCanvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
            background: #0a0a0a;
        }
        
        #sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 250px;
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }
        
        .panel h3 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        
        #playerInfo {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .info-label {
            color: #aaa;
        }
        
        .info-value {
            font-weight: bold;
            color: #ffd700;
        }
        
        #controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c23a51);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.5);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            border: 1px solid #e94560;
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, #1a4a7a, #1e3a5f);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #buildMenu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .build-btn {
            padding: 10px;
            font-size: 0.9em;
            background: linear-gradient(135deg, #2d3a4a, #1a2530);
            border: 2px solid #4a5a6a;
        }
        
        .build-btn:hover {
            border-color: #e94560;
        }
        
        .build-btn.selected {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
        
        .build-btn .cost {
            font-size: 0.8em;
            color: #ffd700;
        }
        
        #gameLog {
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.85em;
            line-height: 1.6;
        }
        
        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .log-entry.attack {
            color: #ff6b6b;
        }
        
        .log-entry.build {
            color: #4ecdc4;
        }
        
        .log-entry.gold {
            color: #ffd700;
        }
        
        #instructions {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.9em;
            line-height: 1.8;
        }
        
        #instructions h4 {
            color: #e94560;
            margin-bottom: 10px;
        }
        
        #instructions ul {
            list-style: none;
            padding-left: 0;
        }
        
        #instructions li {
            padding: 3px 0;
        }
        
        #instructions li::before {
            content: "▸ ";
            color: #e94560;
        }
        
        #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        #gameOverScreen h2 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        
        #gameOverScreen.win h2 {
            color: #4ecdc4;
            text-shadow: 0 0 30px #4ecdc4;
        }
        
        #gameOverScreen.lose h2 {
            color: #e94560;
            text-shadow: 0 0 30px #e94560;
        }
    </style>
</head>
<body>
    <h1 id="gameTitle">👻 猛鬼宿舍 👻</h1>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="sidebar">
            <div class="panel">
                <h3>💰 资源状态</h3>
                <div id="playerInfo">
                    <div class="info-row">
                        <span class="info-label">金币:</span>
                        <span class="info-value" id="goldDisplay">0</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">房间:</span>
                        <span class="info-value" id="roomDisplay">未选择</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">门血量:</span>
                        <span class="info-value" id="doorDisplay">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">床等级:</span>
                        <span class="info-value" id="bedDisplay">-</span>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <h3>🎮 游戏控制</h3>
                <div id="controls">
                    <button class="btn-primary" id="startBtn">开始游戏</button>
                    <button class="btn-secondary" id="pauseBtn" disabled>暂停</button>
                </div>
            </div>
            
            <div class="panel">
                <h3>🏗️ 建造菜单</h3>
                <div id="buildMenu">
                    <button class="build-btn" data-type="turret">
                        🔫 炮台<br><span class="cost">100金币</span>
                    </button>
                    <button class="build-btn" data-type="upgradeTurret">
                        ⬆️ 升级炮台<br><span class="cost">150金币</span>
                    </button>
                    <button class="build-btn" data-type="repair">
                        🔨 修理门<br><span class="cost">50金币</span>
                    </button>
                    <button class="build-btn" data-type="upgradeBed">
                        🛏️ 升级床<br><span class="cost">200金币</span>
                    </button>
                </div>
            </div>
            
            <div class="panel">
                <h3>📜 游戏日志</h3>
                <div id="gameLog"></div>
            </div>
            
            <div id="instructions">
                <h4>🎮 游戏说明</h4>
                <ul>
                    <li><strong>点击地面</strong>移动你的小人</li>
                    <li>走到房间门口自动选择该房间</li>
                    <li>躺在床上自动产生金币</li>
                    <li>建造炮台攻击猛鬼</li>
                    <li>修理被破坏的门</li>
                    <li>存活到最后获胜！</li>
                </ul>
            </div>
        </div>
    </div>
    
    <div id="gameOverScreen">
        <h2 id="gameOverText"></h2>
        <p id="gameOverReason"></p>
        <button class="btn-primary" onclick="location.reload()">重新开始</button>
    </div>

    <script src="ghost-dorm.js"></script>
</body>
</html>
